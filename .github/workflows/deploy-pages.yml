name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Optionally rebuild site/data.json from latest summary
        shell: bash
        run: |
          set -euo pipefail
          SUMMARY_PATH="eval/summary.json"
          if [[ -f "$SUMMARY_PATH" ]]; then
            python3 site/build_site_data.py
            echo "Rebuilt site/data.json from $SUMMARY_PATH"
          else
            echo "No $SUMMARY_PATH in repository. Deploying committed site/ as-is."
          fi

      - name: Deploy site/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
